<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Oscar's Furniture</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .product-detail {
      padding-top: 100px;
      min-height: 100vh;
      background: var(--white);
    }

    .product-detail-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── IMAGE SIDE ── */
    .product-detail-img-wrap {
      position: relative;
      background: var(--blue-pale);
    }

    .product-detail-img-wrap img {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
      transition: transform 0.4s ease;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border: none;
      box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    }
    .lightbox-close {
      position: absolute;
      top: 24px; right: 32px;
      color: white; font-size: 2.5rem;
      cursor: pointer; line-height: 1;
      font-weight: 200;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 0.6; }
    .zoom-hint {
      position: absolute;
      bottom: 16px; right: 16px;
      background: rgba(26,58,92,0.75);
      color: white;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 14px;
    }

    /* ── INFO SIDE ── */
    .product-detail-info {
      padding: 60px 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--white);
    }

    .product-detail-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 40px;
      transition: color 0.3s;
    }
    .product-detail-back:hover { color: var(--blue-mid); }

    .product-detail-cat {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--blue-mid);
      margin-bottom: 14px;
    }

    .product-detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3vw, 3rem);
      font-weight: 300;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 36px;
    }

    .product-detail-code {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .product-detail-divider {
      width: 48px;
      height: 2px;
      background: var(--blue-light);
      margin-bottom: 36px;
    }

    .product-detail-prices {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 44px;
    }

    .product-detail-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--blue-pale);
      border-left: 3px solid var(--blue-mid);
    }

    .price-row-label {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .price-row-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--blue-deep);
    }

    .product-detail-note {
      font-size: 0.8rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .product-detail-enquire {
      display: inline-block;
      background: var(--blue-deep);
      color: var(--white);
      padding: 16px 48px;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s;
      align-self: flex-start;
    }
    .product-detail-enquire:hover { background: var(--blue-mid); }

    .product-not-found {
      text-align: center;
      padding: 120px 40px;
    }
    .product-not-found h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--text-dark);
      margin-bottom: 16px;
    }
    .product-not-found p {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    @media (max-width: 900px) {
      .product-detail-inner { grid-template-columns: 1fr; }
      .product-detail-img-wrap img { min-height: 55vw; }
      .product-detail-info { padding: 40px 28px; }
      .product-detail-back { margin-bottom: 24px; }
    }
  </style>

    function openLightbox(src) {
